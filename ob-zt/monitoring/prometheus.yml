global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: zt-gateway-otel
    static_configs:
      - targets: ["zt-gateway:9464"]

  - job_name: zt-gateway-ra
    static_configs:
      - targets: ["zt-gateway:8080"]
    metrics_path: /zt/metrics

  - job_name: risk-analysis
    static_configs:
      - targets: ["risk-analysis:5002"]
    metrics_path: /metrics

  - job_name: ob-frontend
    static_configs:
      - targets: ["frontend:8081"]
    metrics_path: /metrics

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: docker-stats
    static_configs:
      - targets: ["docker-stats-exporter:9338"]
