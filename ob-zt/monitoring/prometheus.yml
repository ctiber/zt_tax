global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: zt-gateway
    static_configs:
      - targets: ["zt-gateway:9464"]

  - job_name: risk-analysis
    static_configs:
      - targets: ["risk-analysis:5002"]
    metrics_path: /metrics

  - job_name: ob-frontend
    static_configs:
      - targets: ["frontend:8081"]
    metrics_path: /metrics

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
