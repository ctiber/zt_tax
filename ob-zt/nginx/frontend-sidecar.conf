# nginx mTLS sidecar for the OB frontend service.
# Listens on 8443, terminates TLS (with client cert verification), and
# proxies to the frontend on 8081 (internal).
# Used when ZT_MTLS=true; mounted as /etc/nginx/conf.d/default.conf.

server {
    listen 8443 ssl;
    server_name frontend;

    ssl_certificate     /certs/frontend.crt;
    ssl_certificate_key /certs/frontend.key;
    ssl_client_certificate /certs/ca.crt;
    ssl_verify_client on;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Zt-Authorization $http_authorization;
        proxy_read_timeout 60s;
    }
}
