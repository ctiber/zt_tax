global:
  scrape_interval:     5s
  evaluation_interval: 5s

scrape_configs:

  # cAdvisor – per-container CPU, memory, network
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # node-exporter – host-level CPU, memory, disk, network
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  # SoY ZT Gateway – RA call histogram
  - job_name: soy-gateway
    metrics_path: /zt/metrics
    static_configs:
      - targets: ['gateway:8080']

  # Risk Analysis service – RA duration histogram
  - job_name: risk-analysis
    metrics_path: /metrics
    static_configs:
      - targets: ['risk-analysis:9000']
