# Nginx mTLS sidecar for ms-exercise
# Listens on 8443 (HTTPS + mutual TLS), proxies to ms-exercise:8080 (plain HTTP)

worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    access_log /dev/stdout;

    server {
        listen 8443 ssl;
        server_name nginx-exercise;

        # Server certificate (nginx-exercise identity)
        ssl_certificate     /etc/nginx/certs/nginx-exercise.crt;
        ssl_certificate_key /etc/nginx/certs/nginx-exercise.key;

        # Client certificate verification (mutual TLS)
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client on;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass         http://ms-exercise:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Forward verified client DN for audit logging
            proxy_set_header   X-Client-Cert-DN  $ssl_client_s_dn;
        }
    }
}
