# RabbitMQ broker configuration – plain AMQP + TLS (amqps) on separate ports.
# Plain port 5672 remains available for baseline variants (ZT_MTLS=false).
# TLS port 5671 is used when ZT_BROKER_MTLS=true for the mTLS security overhead measurement.

listeners.tcp.default = 5672
listeners.ssl.default = 5671

ssl_options.cacertfile = /etc/rabbitmq/certs/ca.crt
ssl_options.certfile   = /etc/rabbitmq/certs/rabbitmq.crt
ssl_options.keyfile    = /etc/rabbitmq/certs/rabbitmq.key
ssl_options.verify     = verify_peer
ssl_options.fail_if_no_peer_cert = true
